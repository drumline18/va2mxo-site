<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VA2MXO — Amateur Radio</title>
  <meta name="description" content="VA2MXO amateur radio station — Quebec, Canada">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #0c1220;
      --amber: #e89d2d;
      --amber-dim: #a06a15;
      --amber-glow: #f4b94280;
      --green: #33d17a;
      --text: #c8cdd6;
      --text-dim: #6b7280;
      --surface: #0d1420;
    }

    html { font-size: 16px; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 45% 45%, #16120c 0%, #10131a 60%, transparent 100%),
        radial-gradient(ellipse 50% 60% at 85% 75%, #151210 0%, transparent 55%),
        radial-gradient(ellipse 45% 50% at 12% 25%, #101518 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .rf-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: min(850px, 100%);
      height: min(560px, 72vh);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: fadeIn 2s 0.4s ease forwards;
      -webkit-mask-image: radial-gradient(ellipse 65% 55% at 50% 48%, black 0%, transparent 60%);
      mask-image: radial-gradient(ellipse 65% 55% at 50% 48%, black 0%, transparent 60%);
    }

    canvas#rf-glow {
      width: 100%;
      height: 100%;
      display: block;
    }

    .rf-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      mix-blend-mode: multiply;
    }

    .waterfall-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 160px;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 2s 1.5s ease forwards;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 15%, black 40%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 15%, black 40%);
    }

    canvas#waterfall {
      width: 100%;
      height: 100%;
      display: block;
    }

    .quebec-outline {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 92vh;
      width: auto;
      opacity: 0;
      z-index: 0;
      pointer-events: none;
      animation: fadeIn 2s 0.5s ease forwards;
    }

    .quebec-outline path {
      fill: none;
      stroke: var(--amber);
      stroke-width: 0.4;
      opacity: 0.06;
    }

    canvas#noise {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.035;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
    }

    /* On-air indicator */
    .on-air {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0;
      animation: fadeIn 1s 0.3s ease forwards;
    }

    .on-air .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green), 0 0 12px var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* Callsign hero */
    .callsign-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }

    .wave-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      pointer-events: none;
    }

    .wave {
      position: absolute;
      top: 50%;
      left: 50%;
      border: 1px solid var(--amber-glow);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      animation: ripple 5s ease-out infinite;
    }
    .wave:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
    .wave:nth-child(2) { width: 320px; height: 320px; animation-delay: 1.2s; }
    .wave:nth-child(3) { width: 440px; height: 440px; animation-delay: 2.4s; }
    .wave:nth-child(4) { width: 560px; height: 560px; animation-delay: 3.6s; }

    .callsign {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(3rem, 12vw, 7rem);
      color: var(--amber);
      text-shadow:
        0 0 20px var(--amber-glow),
        0 0 60px #e89d2d15;
      letter-spacing: 0.08em;
      position: relative;
      opacity: 0;
      animation: glowIn 1.2s 0.6s ease forwards;
    }

    /* Separator */
    .sep {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber-dim), transparent);
      opacity: 0;
      animation: fadeIn 1s 1s ease forwards;
    }

    /* Info block */
    .info {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeIn 1s 1.2s ease forwards;
    }

    .info .location {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      text-shadow: 0 1px 3px #00000060;
    }

    .info .tagline {
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1.6;
      text-shadow: 0 1px 4px #00000080;
    }

    .info .note {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 300;
      font-style: italic;
      text-shadow: 0 1px 3px #00000060;
    }

    /* Morse decoration */
    .morse {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      line-height: 1;
      min-height: 1em;
      letter-spacing: 0.4em;
      color: var(--amber-dim);
      opacity: 0;
      animation: fadeIn 1s 1.6s ease forwards;
      user-select: none;
    }

    /* Band badges */
    .bands {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 1s 1.8s ease forwards;
    }

    .band {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.7rem;
      border: 1px solid #ffffff0d;
      border-radius: 2px;
      color: var(--text-dim);
      background: var(--surface);
      transition: border-color 0.3s, color 0.3s;
    }

    .band:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    /* Language toggle */
    .lang-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeIn 1s 2s ease forwards;
    }

    .lang-toggle button {
      background: none;
      border: 1px solid #ffffff0d;
      color: var(--text-dim);
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }

    .lang-toggle button:first-child {
      border-radius: 2px 0 0 2px;
      border-right: none;
    }

    .lang-toggle button:last-child {
      border-radius: 0 2px 2px 0;
    }

    .lang-toggle button.active {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: #e89d2d0a;
    }

    .lang-toggle button:hover:not(.active) {
      color: var(--text);
      border-color: #ffffff20;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 2;
      margin-top: 4rem;
      padding: 2rem;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      opacity: 0;
      animation: fadeIn 1s 2s ease forwards;
    }

    .footer-sep {
      width: min(520px, 88vw);
      margin: 0 auto 1.1rem;
      border: 0;
      border-top: 1px solid #e89d2d3b;
    }

    .footer-links {
      margin-bottom: 1.35rem;
    }

    .footer-links p {
      margin: 0.45rem 0;
    }

    .hamdata-card {
      width: min(520px, 88vw);
      margin: 0 auto;
      padding: 1rem 1.1rem 1.05rem;
      border: 1px solid #e89d2d38;
      background: #0f1a2a80;
      box-shadow: inset 0 0 0 1px #ffffff06;
    }

    .hamdata-title {
      margin: 0 0 0.45rem;
      color: var(--amber);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-size: 0.67rem;
    }

    .hamdata-desc {
      margin: 0 0 0.7rem;
      letter-spacing: 0.11em;
      line-height: 1.55;
      color: var(--text-dim);
      font-size: 0.58rem;
    }

    footer a {
      color: var(--amber-dim);
      text-decoration: none;
      transition: color 0.3s;
    }
    footer a:hover { color: var(--amber); }

    /* Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes glowIn {
      0% { opacity: 0; filter: blur(8px); transform: scale(0.95); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes ripple {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 1.5rem 1rem; }
      .bands { gap: 0.35rem; }
      .morse {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        max-width: 100%;
        overflow: hidden;
      }
    }
  </style>
</head>

  <script>
    // Static grain overlay
    (() => {
      const c = document.getElementById('noise');
      const ctx = c.getContext('2d');
      function draw() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        const img = ctx.createImageData(c.width, c.height);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.random() * 255;
          d[i] = d[i+1] = d[i+2] = v;
          d[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
      }
      draw();
      window.addEventListener('resize', draw);
    })();

    // Animated RF noise glow
    (() => {
      const c = document.getElementById('rf-glow');
      const ctx = c.getContext('2d');
      const W = 510;
      const H = 336;
      c.width = W;
      c.height = H;

      function draw() {
        const img = ctx.createImageData(W, H);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.random();
          const burst = Math.random() < 0.03 ? 1.8 : 1;
          d[i]     = Math.min(255, Math.floor((140 + v * 90) * burst));
          d[i + 1] = Math.min(255, Math.floor((65 + v * 55) * burst));
          d[i + 2] = Math.floor(8 + v * 20);
          d[i + 3] = Math.floor(v * v * 110);
        }
        ctx.putImageData(img, 0, 0);
      }

      setInterval(draw, 70);
      draw();
    })();

    // Waterfall display
    (() => {
      const c = document.getElementById('waterfall');
      const ctx = c.getContext('2d');
      const W = 1000;
      const SPECTRUM_H = 36;
      const WF_H = 124;
      const H = SPECTRUM_H + WF_H;
      c.width = W;
      c.height = H;

      function makeSig() {
        const kind = Math.random();
        const w = kind < 0.5 ? 0.002 + Math.random() * 0.003
                : kind < 0.8 ? 0.005 + Math.random() * 0.008
                : 0.012 + Math.random() * 0.01;
        return {
          f: 0.03 + Math.random() * 0.94,
          w,
          s: 0.3 + Math.random() * 0.65,
          on: Math.random() < 0.7,
          nextToggle: 200 + Math.floor(Math.random() * 600),
          txLen: 80 + Math.floor(Math.random() * 300),
          txTimer: 0,
          ramp: 0,
        };
      }

      const NUM = 14 + Math.floor(Math.random() * 12);
      const signals = Array.from({ length: NUM }, makeSig);

      let t = 0;
      let smoothSpectrum = new Float32Array(W);

      function color(v) {
        if (v < 0.15) {
          const n = v / 0.15;
          return [Math.floor(8 + n * 12), Math.floor(8 + n * 8), Math.floor(14 + n * 10)];
        }
        if (v < 0.35) {
          const n = (v - 0.15) / 0.2;
          return [Math.floor(20 + n * 60), Math.floor(16 + n * 25), Math.floor(24 - n * 8)];
        }
        if (v < 0.55) {
          const n = (v - 0.35) / 0.2;
          return [Math.floor(80 + n * 90), Math.floor(41 + n * 40), Math.floor(16 + n * 6)];
        }
        if (v < 0.75) {
          const n = (v - 0.55) / 0.2;
          return [Math.floor(170 + n * 52), Math.floor(81 + n * 55), Math.floor(22 + n * 10)];
        }
        const n = (v - 0.75) / 0.25;
        return [Math.floor(222 + n * 33), Math.floor(136 + n * 60), Math.floor(32 + n * 20)];
      }

      function updateSignals() {
        for (const sig of signals) {
          sig.nextToggle--;
          if (sig.on) {
            sig.txTimer++;
            if (sig.txTimer >= sig.txLen) {
              sig.on = false;
              sig.txTimer = 0;
              sig.nextToggle = 100 + Math.floor(Math.random() * 500);
              sig.txLen = 80 + Math.floor(Math.random() * 300);
            }
          } else if (sig.nextToggle <= 0) {
            sig.on = true;
            sig.txTimer = 0;
            sig.nextToggle = 999;
          }
          const target = sig.on ? 1 : 0;
          sig.ramp += (target - sig.ramp) * 0.08;
        }
      }

      function genRow() {
        const data = new Float32Array(W);
        for (let x = 0; x < W; x++) {
          const f = x / W;
          let v = (Math.random() * 0.07) + 0.04;
          for (const sig of signals) {
            if (sig.ramp < 0.01) continue;
            const drift = Math.sin(t * 0.002 + sig.f * 80) * 0.003;
            const cf = sig.f + drift;
            const dist = Math.abs(f - cf);
            if (dist < sig.w * 5) {
              const g = Math.exp(-(dist * dist) / (2 * sig.w * sig.w));
              v += g * sig.s * sig.ramp * (0.55 + Math.random() * 0.45);
            }
          }
          data[x] = Math.min(1, v);
        }
        return data;
      }

      function drawSpectrum(data) {
        for (let x = 0; x < W; x++) {
          smoothSpectrum[x] = smoothSpectrum[x] * 0.7 + data[x] * 0.3;
        }

        ctx.fillStyle = '#0a0e16';
        ctx.fillRect(0, 0, W, SPECTRUM_H);

        ctx.beginPath();
        ctx.moveTo(0, SPECTRUM_H);
        for (let x = 0; x < W; x++) {
          ctx.lineTo(x, SPECTRUM_H - smoothSpectrum[x] * (SPECTRUM_H - 4));
        }
        ctx.lineTo(W, SPECTRUM_H);
        ctx.closePath();

        const grad = ctx.createLinearGradient(0, 0, 0, SPECTRUM_H);
        grad.addColorStop(0, 'rgba(232, 157, 45, 0.5)');
        grad.addColorStop(0.5, 'rgba(160, 100, 20, 0.2)');
        grad.addColorStop(1, 'rgba(80, 50, 10, 0.05)');
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, SPECTRUM_H - smoothSpectrum[0] * (SPECTRUM_H - 4));
        for (let x = 1; x < W; x++) {
          ctx.lineTo(x, SPECTRUM_H - smoothSpectrum[x] * (SPECTRUM_H - 4));
        }
        ctx.strokeStyle = 'rgba(232, 170, 70, 0.65)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 0.5;
        for (let i = 1; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(0, (SPECTRUM_H / 4) * i);
          ctx.lineTo(W, (SPECTRUM_H / 4) * i);
          ctx.stroke();
        }

        ctx.strokeStyle = 'rgba(160,106,21,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(0, SPECTRUM_H - 0.5);
        ctx.lineTo(W, SPECTRUM_H - 0.5);
        ctx.stroke();
      }

      function drawWfRow(data) {
        ctx.drawImage(c, 0, SPECTRUM_H, W, WF_H - 1, 0, SPECTRUM_H + 1, W, WF_H - 1);
        const img = ctx.createImageData(W, 1);
        for (let x = 0; x < W; x++) {
          const [r, g, b] = color(data[x]);
          img.data[x * 4] = r;
          img.data[x * 4 + 1] = g;
          img.data[x * 4 + 2] = b;
          img.data[x * 4 + 3] = 255;
        }
        ctx.putImageData(img, 0, SPECTRUM_H);
      }

      for (let y = 0; y < WF_H; y++) {
        updateSignals();
        const r = genRow();
        const img = ctx.createImageData(W, 1);
        for (let x = 0; x < W; x++) {
          const [cr, cg, cb] = color(r[x]);
          img.data[x * 4] = cr;
          img.data[x * 4 + 1] = cg;
          img.data[x * 4 + 2] = cb;
          img.data[x * 4 + 3] = 255;
        }
        ctx.putImageData(img, 0, SPECTRUM_H + y);
        smoothSpectrum = smoothSpectrum.map((s, i) => s * 0.7 + r[i] * 0.3);
        t++;
      }

      function tick() {
        updateSignals();
        const r = genRow();
        drawWfRow(r);
        drawSpectrum(r);
        t++;
      }

      setInterval(tick, 55);
    })();

    // Morse code animation for "VA2MXO"
    (() => {
      const morse = {
        'V': '...-', 'A': '.-', '2': '..---',
        'M': '--', 'X': '-..-', 'O': '---'
      };
      const call = 'VA2MXO';
      const el = document.querySelector('.morse-output');
      const UNIT_MS = 120;
      const DOT = UNIT_MS;
      const DASH = UNIT_MS * 3;
      const GAP_SYMBOL = UNIT_MS;
      const GAP_LETTER = UNIT_MS * 3;
      const LOOP_PAUSE = UNIT_MS * 10;
      const START_DELAY = 2200;
      const RESTART_DELAY = 1200;

      function play() {
        el.textContent = '';
        let delay = 0;

        call.split('').forEach((letter, letterIndex, letters) => {
          const pattern = morse[letter];
          if (!pattern) return;

          pattern.split('').forEach((symbol, symbolIndex) => {
            const visual = symbol === '.' ? '\u00B7' : '\u2014';
            setTimeout(() => {
              el.textContent += visual;
            }, delay);
            delay += symbol === '.' ? DOT : DASH;

            if (symbolIndex < pattern.length - 1) {
              delay += GAP_SYMBOL;
            }
          });

          if (letterIndex < letters.length - 1) {
            setTimeout(() => {
              el.textContent += '  ';
            }, delay);
            delay += GAP_LETTER;
          }
        });

        setTimeout(() => {
          el.textContent = '';
        }, delay + LOOP_PAUSE);

        setTimeout(play, delay + LOOP_PAUSE + RESTART_DELAY);
      }

      setTimeout(play, START_DELAY);
    })();

    // Language toggle
    (() => {
      const strings = {
        en: {
          onair: 'On Air',
          tagline: 'Newly licensed. Building the shack.<br>More to come on this frequency.',
          hamdataTitle: 'Canadian Ham Stats',
          hamdataDesc: 'Statistics on Canadian amateur radio operators sourced from ISED and analyzed over time.',
        },
        fr: {
          onair: 'En ondes',
          tagline: 'Tout juste certifié. Le shack prend forme.<br>Plus à venir sur cette fréquence.',
          hamdataTitle: 'Statistiques radioamateurs canadiens',
          hamdataDesc: 'Statistiques sur les radioamateurs canadiens provenant d\'ISED et analysees dans le temps.',
        }
      };

      const buttons = document.querySelectorAll('.lang-toggle button');
      let current = localStorage.getItem('va2mxo-lang') || 'en';

      function apply(lang) {
        current = lang;
        localStorage.setItem('va2mxo-lang', lang);
        document.documentElement.lang = lang;
        buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        document.querySelectorAll('[data-i18n]').forEach(el => {
          el.innerHTML = strings[lang][el.dataset.i18n];
        });
      }

      buttons.forEach(b => b.addEventListener('click', () => apply(b.dataset.lang)));
      apply(current);
    })();
  </script>
</body>
</html>
